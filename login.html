<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFSertãoPE - SGE | Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-container">
        <div class="brand-section">
            <img src="if.png" alt="Logo IFSertãoPE">
            <h1>SGE Estágios</h1>
            <p>Sistema de Gestão de Estágios</p>
        </div>

        <form id="loginForm" action="login.php" method="POST">
           
            <div class="form-group">
                <label for="username">Usuário (CPF)</label>
                <input type="text" id="username" name="username" placeholder="Digite o seu usuário" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="Digite a sua senha" required autocomplete="current-password">
            </div>

            <div class="options-row">
                <label class="remember-me">
                    <input type="checkbox" name="remember"> Lembrar-me
                </label>
                <a href="recuperacao_senha.html" class="forgot-password">Esqueceu-se da senha?</a>
            </div>

            <div id="error-message" style="color: #e74c3c; margin-bottom: 15px; font-size: 0.85rem; text-align: left; display: none; font-weight: 600;"></div>

            <button type="submit" class="btn-login">Entrar</button>
        </form>

        <div class="footer-links">
            <p>Novo por aqui? <a href="cadastro.html">Cadastre o seu perfil</a></p>
        </div>
    </div>

   <script>

    // Máscara CPF
    const cpfInput = document.getElementById('username');

    cpfInput.addEventListener('input', function () {

        let valor = this.value.replace(/\D/g, '');

        valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
        valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
        valor = valor.replace(/(\d{3})(\d{1,2})$/, '$1-$2');

        this.value = valor;
    });

    document.getElementById('loginForm').addEventListener('submit', async function(event) {

        event.preventDefault();

        const usuario = document.getElementById('username').value.trim();
        const senha = document.getElementById('password').value;

        const errorDiv = document.getElementById('error-message');

        errorDiv.style.display = 'none';

        if(usuario === '' || senha === '') {

            errorDiv.innerText = 'Preencha todos os campos.';
            errorDiv.style.display = 'block';

            return;
        }

        try {

            const response = await fetch('login.php', {

                method: 'POST',

                headers: {
                    'Content-Type': 'application/json'
                },

                body: JSON.stringify({
                    username: usuario,
                    password: senha
                })

            });

            const dados = await response.json();

            if(response.ok) {

                // Dados do usuário
                localStorage.setItem('usuario_id', dados.usuario.id);
                localStorage.setItem('usuario_nome', dados.usuario.nome);
                localStorage.setItem('usuario_perfil', dados.usuario.perfil);

                // Redirecionamento por perfil

                switch(dados.usuario.perfil) {

                    case 'admin':
                        window.location.href = 'dashboard_admin.php';
                        break;

                    case 'orientador':
                        window.location.href = 'dashboard_orientador.php';
                        break;

                    case 'supervisor':
                        window.location.href = 'dashboard_supervisor.php';
                        break;

                    case 'estagiario':
                        window.location.href = 'dashboard_estagiario.php';
                        break;

                    default:
                        window.location.href = 'tela_inicial.html';
                }

            } else {

                errorDiv.innerText =
                    dados.mensagem || 'Usuário ou senha inválidos.';

                errorDiv.style.display = 'block';
            }

        } catch(error) {

            errorDiv.innerText =
                'Erro de conexão com o servidor. Verifique o Apache e o MySQL.';

            errorDiv.style.display = 'block';
        }

    });

</script>
</body>
</html>
