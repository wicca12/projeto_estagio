<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFSertãoPE - SGE | Cadastro</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-container">

        <div class="brand-section">
            <img src="if.png" alt="Logo IFSertãoPE">
            <h1>Criar Conta</h1>
            <p>Preencha os campos para se cadastrar no SGE</p>
        </div>

        <form id="registerForm">

            <div class="form-group">
                <label for="fullName">Nome Completo</label>
                <input
                    type="text"
                    id="fullName"
                    name="fullName"
                    placeholder="Digite seu nome completo"
                    required>
            </div>

            <div class="form-group">
                <label for="regId">CPF</label>
                <input
                    type="text"
                    id="regId"
                    name="regId"
                    maxlength="14"
                    placeholder="000.000.000-00"
                    required>
            </div>

            <div class="form-group">
                <label for="email">E-mail Institucional</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="exemplo@ifsertao-pe.edu.br"
                    required>
            </div>

            <div class="form-group">
                <label for="profileType">Tipo de Perfil</label>

                <select
                    id="profileType"
                    name="profileType"
                    class="form-select"
                    required>

                    <option value="" disabled selected>
                        Selecione seu perfil
                    </option>

                    <option value="aluno">
                        Aluno / Estagiário
                    </option>

                    <option value="orientador">
                        Professor / Orientador
                    </option>

                </select>
            </div>

            <div class="form-group">
                <label for="newPassword">Senha</label>
                <input
                    type="password"
                    id="newPassword"
                    name="newPassword"
                    placeholder="Crie uma senha forte"
                    autocomplete="new-password"
                    required>
            </div>

            <div
                id="response-message"
                style="
                    margin-bottom:15px;
                    font-size:0.85rem;
                    text-align:left;
                    display:none;
                    font-weight:600;">
            </div>

            <button type="submit" class="btn-login">
                Cadastrar Perfil
            </button>

        </form>

        <div class="footer-links">
            <p>
                Já possui uma conta?
                <a href="login.html">Faça o Login</a>
            </p>
        </div>

    </div>

    <script>

        // Máscara CPF

        const cpfInput = document.getElementById('regId');

        cpfInput.addEventListener('input', function () {

            let valor = this.value.replace(/\D/g, '');

            valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
            valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
            valor = valor.replace(/(\d{3})(\d{1,2})$/, '$1-$2');

            this.value = valor;
        });


        document.getElementById('registerForm').addEventListener('submit', async function(event) {

            event.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const regId = document.getElementById('regId').value.trim();
            const email = document.getElementById('email').value.trim();
            const profileType = document.getElementById('profileType').value;
            const password = document.getElementById('newPassword').value;

            const responseDiv =
                document.getElementById('response-message');

            responseDiv.style.display = 'none';

            // Senha mínima

            if (password.length < 6) {

                responseDiv.style.color = '#e74c3c';
                responseDiv.innerText =
                    'A senha deve possuir pelo menos 6 caracteres.';
                responseDiv.style.display = 'block';

                return;
            }

            // E-mail institucional

            if (!email.endsWith('@ifsertao-pe.edu.br')) {

                responseDiv.style.color = '#e74c3c';
                responseDiv.innerText =
                    'Utilize um e-mail institucional do IF Sertão-PE.';
                responseDiv.style.display = 'block';

                return;
            }

            try {

                const response = await fetch('cadastro.php', {

                    method: 'POST',

                    headers: {
                        'Content-Type': 'application/json'
                    },

                    body: JSON.stringify({
                        fullName,
                        regId,
                        email,
                        profileType,
                        password
                    })

                });

                const dados = await response.json();

                if (response.ok) {

                    responseDiv.style.color = '#27ae60';

                    responseDiv.innerText =
                        dados.mensagem ||
                        'Cadastro efetuado com sucesso!';

                    responseDiv.style.display = 'block';

                    document.getElementById('registerForm').reset();

                    setTimeout(() => {

                        window.location.href = 'login.html';

                    }, 2000);

                } else {

                    responseDiv.style.color = '#e74c3c';

                    responseDiv.innerText =
                        dados.mensagem ||
                        'Erro ao realizar o cadastro.';

                    responseDiv.style.display = 'block';
                }

            } catch (error) {

                responseDiv.style.color = '#e74c3c';

                responseDiv.innerText =
                    'Erro de conexão com o servidor. Verifique o XAMPP/Apache e o MySQL.';

                responseDiv.style.display = 'block';
            }

        });

    </script>

</body>
</html>
